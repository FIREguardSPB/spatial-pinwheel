name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ── Backend: Lint ─────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint (ruff + black)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black

      - name: Ruff
        run: ruff check . --output-format=github

      - name: Black
        run: black --check .

      - name: Mypy (strict)
        run: |
          pip install mypy types-redis
          mypy apps/ core/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: false

  # ── Backend: Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: bot
          POSTGRES_DB: botdb_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: "postgresql+psycopg://bot:bot@localhost:5432/botdb_test"
      REDIS_URL: "redis://localhost:6379/0"
      ALLOW_NO_REDIS: "true"
      AUTH_TOKEN: "ci-test-token"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=apps --cov=core \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  # ── Frontend: Lint + Build ────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ── Docker Build ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (all images)
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/apps/api/Dockerfile
          push: false
          tags: trading-bot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/apps/worker/Dockerfile
          push: false
          tags: trading-bot-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: trading-bot-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
